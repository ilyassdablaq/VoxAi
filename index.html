<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxAI - AI Voice Chatbots for Business</title>
    <meta
      name="description"
      content="Build AI voice chatbots with speech-to-text, text-to-speech, RAG, and easy website embedding for customer support and automation."
    />
    <meta name="author" content="VoxAI" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0EC4D8" />
    <meta name="application-name" content="VoxAI" />
    <meta name="keywords" content="AI chatbot, voice chatbot, speech-to-text, text-to-speech, RAG, customer support, website embedding, AI automation" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VoxAI" />
    <meta property="og:title" content="VoxAI - AI Voice Chatbots for Business" />
    <meta
      property="og:description"
      content="Build AI voice chatbots with speech-to-text, text-to-speech, RAG, and easy website embedding for customer support and automation."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VoxAI - AI Voice Chatbots for Business" />
    <meta
      name="twitter:description"
      content="Build AI voice chatbots with speech-to-text, text-to-speech, RAG, and easy website embedding for customer support and automation."
    />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- Organization Structured Data (GEO-equivalent for global SaaS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "VoxAI",
      "description": "AI-powered conversational voice platform for modern businesses.",
      "url": "https://voxflow-ai-site.vercel.app",
      "logo": "https://voxflow-ai-site.vercel.app/favicon.svg",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English", "German", "French", "Arabic"]
      }
    }
    </script>

    <!-- SoftwareApplication Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "VoxAI",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "description": "Build and embed AI voice chatbots with speech-to-text, RAG, and website integration.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free plan available"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
