name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run SEO consistency check
        run: npm run seo:check

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build backend
        run: npm run build

  security-static-analysis:
    name: Security Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep security scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            returntocorp/semgrep:latest \
            semgrep scan --config p/default --error --metrics=off /src

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend dependency audit
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-static-analysis, dependency-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    environment:
      name: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to development
        run: echo "Deploy development environment here"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-static-analysis, dependency-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Deploy production environment here"
