version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: voxai-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voxai
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /var/run/postgresql

  redis:
    image: redis:7.4-alpine
    container_name: voxai-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: voxai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

volumes:
  postgres_data:
  redis_data:
